<!DOCTYPE html>
<html>
<head>
<title>BoxWiki Career Mode</title>
<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:15px;
}

input, select, button {
    padding:10px;
    margin:8px;
    border-radius:8px;
}

button {
    background:#e63946;
    color:white;
    border:none;
    cursor:pointer;
}

.stats {
    text-align:left;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🥊 BoxWiki Career Mode</h1>

<div id="create">

<h2>Create Fighter</h2>

<input id="name" placeholder="Fighter Name">

<br>

<select id="style">
<option>Power Puncher</option>
<option>Speed Boxer</option>
<option>Counter Puncher</option>
<option>Balanced</option>
</select>

<br>

<select id="weight">
<option>Heavyweight</option>
<option>Middleweight</option>
<option>Welterweight</option>
<option>Lightweight</option>
</select>

<br>

<button onclick="createFighter()">Start Career</button>

</div>


<div id="career" style="display:none">

<h2 id="fighterName"></h2>

<div class="stats">

<p>Age: <span id="age"></span></p>
<p>Record: <span id="record"></span></p>
<p>Titles: <span id="titles"></span></p>

<h3>Attributes</h3>

<p>Power: <span id="power"></span></p>
<p>Speed: <span id="speed"></span></p>
<p>Defense: <span id="defense"></span></p>

</div>


<button onclick="train()">Train</button>

<button onclick="fight()">Fight</button>

<p id="result"></p>

</div>

</div>


<script>

let fighter = {};

function createFighter(){

fighter = {
name: document.getElementById("name").value,
style: document.getElementById("style").value,
weight: document.getElementById("weight").value,

age:18,
wins:0,
losses:0,
titles:0,

power:60,
speed:60,
defense:60
};

document.getElementById("create").style.display="none";
document.getElementById("career").style.display="block";

update();

}


function train(){

fighter.power += Math.floor(Math.random()*3);
fighter.speed += Math.floor(Math.random()*3);
fighter.defense += Math.floor(Math.random()*3);

fighter.age++;

document.getElementById("result").innerHTML=
"Training complete! Your fighter improved.";

update();

}


function fight(){

let chance = Math.floor(Math.random()*100);

fighter.age++;

if(chance > 35){

fighter.wins++;

document.getElementById("result").innerHTML=
"🏆 Victory! Your fighter won the fight.";

if(fighter.wins % 10 == 0){
fighter.titles++;
document.getElementById("result").innerHTML +=
" 🥇 Won a championship!";
}

}

else{

fighter.losses++;

document.getElementById("result").innerHTML=
"❌ Loss. Time to rebuild.";

}

update();

}


function update(){

document.getElementById("fighterName").innerHTML=
fighter.name + " (" + fighter.style + ")";

document.getElementById("age").innerHTML=fighter.age;

document.getElementById("record").innerHTML=
fighter.wins+"-"+fighter.losses;

document.getElementById("titles").innerHTML=
fighter.titles;

document.getElementById("power").innerHTML=fighter.power;
document.getElementById("speed").innerHTML=fighter.speed;
document.getElementById("defense").innerHTML=fighter.defense;

}

</script>

</body>
  </html>
